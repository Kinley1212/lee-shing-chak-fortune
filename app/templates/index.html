<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>李丞責博士 · 玄學AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d1a;
  --header-bg:#1a0a2e;
  --menu-bg:#1a1a2e;
  --input-bg:#12122a;
  --bubble-ai:#2a1a4a;
  --bubble-user-from:#6a0dad;
  --bubble-user-to:#9b30ff;
  --gold:#d4af37;
  --gold-light:#f0d870;
  --border:#2a2a5a;
  --text:#e8e8f8;
  --text-dim:#8888aa;
  --green:#4caf50;
  --avatar-bg:#3d1c6e;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:"PingFang TC","Hiragino Sans TC","Microsoft JhengHei",sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── 外層容器（手機視圖居中） ── */
#app{
  max-width:480px;
  margin:0 auto;
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 60px rgba(106,13,173,.15);
}

/* ── 頂部標題欄 ── */
#header{
  height:60px;
  min-height:60px;
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:12px;
  flex-shrink:0;
  z-index:10;
}

#hd-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--avatar-bg);
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:700;color:var(--gold);
  box-shadow:0 0 10px rgba(212,175,55,.3);
}

#hd-info{flex:1;min-width:0}
#hd-name{
  font-size:.95rem;font-weight:700;letter-spacing:.5px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#hd-status{
  font-size:.72rem;color:var(--text-dim);
  display:flex;align-items:center;gap:5px;margin-top:2px;
}
#hd-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 5px var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── 聊天區域 ── */
#chat{
  flex:1;overflow-y:auto;
  padding:16px 14px 8px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── 訊息行 ── */
.row{display:flex;gap:8px;max-width:88%;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.row.ai{align-self:flex-start}
.row.user{align-self:flex-end;flex-direction:row-reverse}

.row-av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;margin-top:2px;
}
.row.ai .row-av{background:var(--avatar-bg);color:var(--gold);border:1px solid var(--gold)}
.row.user .row-av{background:linear-gradient(135deg,#6a0dad,#9b30ff);color:#fff}

.col{display:flex;flex-direction:column;gap:3px}

.bubble{
  padding:10px 14px;line-height:1.65;font-size:.875rem;
  word-break:break-word;white-space:pre-wrap;
}
.row.ai .bubble{
  background:var(--bubble-ai);
  border:1px solid rgba(106,13,173,.4);
  border-radius:4px 14px 14px 14px;
  color:var(--text);
}
.row.user .bubble{
  background:linear-gradient(135deg,var(--bubble-user-from),var(--bubble-user-to));
  border-radius:14px 4px 14px 14px;
  color:#fff;
}

.ts{font-size:.65rem;color:var(--text-dim);padding:0 4px}
.row.user .ts{text-align:right}

/* 三點載入 */
.dots{display:inline-flex;gap:5px;padding:2px 0}
.dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);opacity:.35;
  animation:blink .9s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── 選單按鈕區 ── */
#menu{
  padding:10px 14px 8px;
  background:var(--menu-bg);
  border-top:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:8px;
  flex-shrink:0;
  min-height:52px;
}

.mbtn{
  padding:7px 16px;border-radius:8px;font-size:.82rem;
  border:1px solid rgba(212,175,55,.35);
  background:rgba(61,28,110,.4);
  color:var(--text);cursor:pointer;
  transition:background .18s,border-color .18s,color .18s;
  white-space:nowrap;
}
.mbtn:hover{background:rgba(106,13,173,.5);border-color:var(--gold);color:var(--gold)}
.mbtn:active{transform:scale(.96);background:rgba(155,48,255,.5)}

/* ── 輸入區 ── */
#inputbar{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 12px;
  background:var(--input-bg);
  border-top:1px solid var(--border);
  flex-shrink:0;
}

#txt{
  flex:1;padding:10px 16px;
  border-radius:22px;border:1px solid var(--border);
  background:#1e1e3a;color:var(--text);
  font-size:.875rem;outline:none;
  font-family:inherit;
  transition:border-color .2s;
}
#txt:focus{border-color:#9b30ff}
#txt::placeholder{color:var(--text-dim)}

#sbtn{
  width:42px;height:42px;border-radius:50%;border:none;flex-shrink:0;
  background:linear-gradient(135deg,#6a0dad,#9b30ff);
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s,transform .1s;
}
#sbtn:hover{opacity:.88}
#sbtn:active{transform:scale(.93)}
#sbtn:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<div id="app">

  <!-- 頂部標題欄 -->
  <div id="header">
    <div id="hd-avatar">李</div>
    <div id="hd-info">
      <div id="hd-name">李丞責博士</div>
      <div id="hd-status"><span id="hd-dot"></span>玄學AI · 在線</div>
    </div>
  </div>

  <!-- 聊天區域 -->
  <div id="chat"></div>

  <!-- 選單按鈕區 -->
  <div id="menu"></div>

  <!-- 輸入區 -->
  <div id="inputbar">
    <input id="txt" type="text" placeholder="輸入問題，例如：屬馬今年財運如何？" autocomplete="off"/>
    <button id="sbtn" onclick="sendMsg()">&#10148;</button>
  </div>

</div>

<script>
const chatEl = document.getElementById("chat");
const menuEl = document.getElementById("menu");
const txtEl  = document.getElementById("txt");
const sbtnEl = document.getElementById("sbtn");

// 對話歷史（最近10輪）
let history = [];
let currentMenu = "main";

// ── 工具 ─────────────────────────────────────────

function now() {
  return new Date().toLocaleTimeString("zh-HK",{hour:"2-digit",minute:"2-digit"});
}

function scrollBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ── 氣泡渲染 ────────────────────────────────────

function addBubble(text, isUser) {
  const row = document.createElement("div");
  row.className = "row " + (isUser ? "user" : "ai");

  const av = document.createElement("div");
  av.className = "row-av";
  av.textContent = isUser ? "你" : "李";

  const col = document.createElement("div");
  col.className = "col";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  const ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = now();

  col.appendChild(bubble);
  col.appendChild(ts);
  row.appendChild(av);
  row.appendChild(col);
  chatEl.appendChild(row);
  scrollBottom();
  return bubble;
}

function showLoading() {
  const row = document.createElement("div");
  row.className = "row ai";
  row.id = "loading-row";

  const av = document.createElement("div");
  av.className = "row-av";
  av.textContent = "李";

  const col = document.createElement("div");
  col.className = "col";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  col.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(col);
  chatEl.appendChild(row);
  scrollBottom();
}

function removeLoading() {
  const el = document.getElementById("loading-row");
  if (el) el.remove();
}

// ── 選單 ─────────────────────────────────────────

async function loadMenu(name) {
  try {
    const r = await fetch("/menu/" + name);
    const d = await r.json();
    currentMenu = name;
    menuEl.innerHTML = "";
    d.buttons.forEach(btn => {
      const b = document.createElement("button");
      b.className = "mbtn";
      b.textContent = btn.label;
      b.onclick = () => {
        if (btn.action === "nav_main") {
          loadMenu("main");
        } else {
          txtEl.value = btn.label;
          sendMsg();
        }
      };
      menuEl.appendChild(b);
    });
  } catch(e) {
    console.error("選單載入失敗", e);
  }
}

// ── 發送訊息 ─────────────────────────────────────

async function sendMsg() {
  const text = txtEl.value.trim();
  if (!text || sbtnEl.disabled) return;

  txtEl.value = "";
  sbtnEl.disabled = true;

  addBubble(text, true);
  showLoading();

  // 加入歷史
  history.push({role:"user", content: text});
  if (history.length > 20) history = history.slice(-20);

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: text, history: history.slice(-10)})
    });
    const data = await res.json();
    removeLoading();

    if (data.error) {
      addBubble("⚠️ " + data.error, false);
    } else {
      addBubble(data.reply, false);
      history.push({role:"model", content: data.reply});
      if (history.length > 20) history = history.slice(-20);

      if (data.menu && data.menu !== currentMenu) {
        await loadMenu(data.menu);
      }
    }
  } catch(e) {
    removeLoading();
    addBubble("⚠️ 網絡錯誤，請稍後再試。", false);
  } finally {
    sbtnEl.disabled = false;
    txtEl.focus();
  }
}

// Enter 鍵發送
txtEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── 初始化 ───────────────────────────────────────

function init() {
  addBubble("您好！我是李丞責博士。\n\n我擅長紫微斗數、奇門遁甲、九宮飛星風水，可為您分析2026年各生肖運勢。\n\n請問有什麼可以為您解答？", false);
  loadMenu("main");
}

init();
</script>
</body>
</html>
